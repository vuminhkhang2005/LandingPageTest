# Workflow deploy trang tĩnh lên GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - production/deploy  # Chạy deploy khi push vào các nhánh này

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

# Thiết lập quyền hạn cho GITHUB_TOKEN để cho phép deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh việc chạy đè nhiều workflow cùng lúc
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Pages
        uses: actions/configure-pages@v4

      - name: Tải lên tài nguyên (Upload Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          # Thư mục gốc chứa index.html
          path: '.'

      - name: Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
